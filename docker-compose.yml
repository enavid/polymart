name: polymart

# Anchor: every app container talks to the in-network db/redis hostnames,
# regardless of what backend/.env says (which targets localhost for native dev).
x-app-environment: &app-environment
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-change-me}
  DATABASE_URL: postgres://${POSTGRES_USER:-polymart}:${POSTGRES_PASSWORD:-polymart}@db:5432/${POSTGRES_DB:-polymart}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polymart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymart}
      POSTGRES_DB: ${POSTGRES_DB:-polymart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polymart}"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      <<: *app-environment
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      target: dev
    command: celery -A config worker -l info
    environment:
      <<: *app-environment
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  beat:
    build:
      context: ./backend
      target: dev
    command: celery -A config beat -l info
    environment:
      <<: *app-environment
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
